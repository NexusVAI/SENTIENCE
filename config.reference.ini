# Sentience V5 - Anima · config.reference.ini
# 这是参考配置，不会被游戏自动读取。
# 游戏实际读取位置：%USERPROFILE%\Documents\GTA5MOD2026\config.ini

[LLM]
# local 或 cloud
Provider=local

# 本地 llama.cpp / 兼容 OpenAI API
LocalEndpoint=http://127.0.0.1:5001/v1/chat/completions
LocalModel=gta5_npc_v2_q4km
LightEndpoint=http://127.0.0.1:5001/v1/chat/completions
LightModel=gta5_npc_v2_q4km

# 云端 OpenAI-compatible API
CloudEndpoint=https://api.deepseek.com/v1/chat/completions
CloudModel=deepseek-v4-flash
CloudAPIKey=

[Performance]
# V5 输出 dialogue|action|emotion|intent (4 段 pipe)，给足 token
MaxTokens=120
MaxTokensThinking=160
Temperature=0.7
MaxDialogueLength=45
RequestCooldown=2.0
StrictMode=True

[TTS]
TTSProvider=edge
TTSServer=http://127.0.0.1:5111
VoiceEnabled=True

[STT]
WhisperModelPath=C:\whisper-tiny

[Awakening]
Enabled=True
Speed=2
