; =============================================================================
;  Sentience V5.1 · Animus — Archetype Voice Reference
; -----------------------------------------------------------------------------
;  Copy this file to:
;      %USERPROFILE%\Documents\GTA5MOD2026\archetype_voices.ini
;  Or place it next to GTA5MOD2026.dll inside <GTA V>\scripts\.
;
;  Any section here OVERRIDES the built-in archetype with the same id.
;  Built-in archetypes you can customize:
;      civilian, wealthy, business, hollywood, biker, gang_hood, gang_latino,
;      punk, dealer, hipster, hippie, skater, hillbilly, farmer, meth,
;      homeless, beach, beach_muscle, lifeguard, construction, trucker,
;      bartender, police, medical, firefighter, elderly, tourist, fitness
;
;  Keys:
;      DisplayName       中文显示名（F5 菜单 / 调试用）
;      PersonalityPrompt 注入到 LLM system prompt 的一句中文人格描述
;      MaleVoice         edge-tts 男声短名，例 zh-CN-YunjianNeural
;      FemaleVoice       edge-tts 女声短名，例 zh-CN-XiaomengNeural
;      SpeakingRate      default / fast / slow
;      Walkstyles        逗号分隔的 GTA 行走 clipset 名
;
;  专用 section [PedHashOverrides] 可以把特定 ped 模型重新映射到 archetype。
;  hash 用 0xXXXXXXXX 格式（uint, 8 hex digits）。
; =============================================================================


[biker]
DisplayName       = 机车党
PersonalityPrompt = 你是 Los Santos Lost 机车党成员，敌视警察，说话粗鲁，常带脏字。
MaleVoice         = zh-CN-YunjianNeural
FemaleVoice       = zh-CN-XiaoyanNeural
Walkstyles        = move_m@brave, move_m@swagger, move_m@tough_guy@


[wealthy]
DisplayName       = 富人
PersonalityPrompt = 你是 Vinewood / Rockford Hills 的富人，挑剔、优越感强、对警察不耐烦。
MaleVoice         = zh-CN-YunyangNeural
FemaleVoice       = zh-CN-XiaohanNeural
SpeakingRate      = slow
Walkstyles        = move_m@business@a, move_m@business@c, move_f@arrogant@a


[hipster]
DisplayName       = 文艺嬉皮
PersonalityPrompt = 你装作冷淡的文艺青年，用小众词汇、嘲讽流行文化。
MaleVoice         = zh-CN-YunxiNeural
FemaleVoice       = zh-CN-XiaoxiaoNeural


[homeless]
DisplayName       = 流浪汉
PersonalityPrompt = 你是街头流浪者，疲惫、含糊、东拉西扯，话题经常跑偏。
MaleVoice         = zh-CN-YunfengNeural
FemaleVoice       = zh-CN-XiaorouNeural
SpeakingRate      = slow


; ── Ped Hash Overrides ────────────────────────────────────────────────────
; 如果你想把某个具体 ped model 强制划到某 archetype，列在这里。
; （hash 值可以从 SHVDN3 PedHash 枚举里取 uint。下面是示例，按需自行填写。）

[PedHashOverrides]
; 0x12345678 = biker
; 0xABCDEF01 = hipster
